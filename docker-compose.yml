# EdgeRadar local stack.
#
# Phase 0 brings up the data-lake layer (MinIO) plus a Python `app` container
# where ingestion/CLI commands run. DuckDB needs no container — it's an embedded,
# file-based warehouse living under ./data/warehouse (a mounted volume), so the
# `app` service simply reads/writes that file. Redpanda (streaming), dbt, Dagster,
# and Streamlit are added in their respective later phases.
#
# Bring it up:   make up      (then open the MinIO console — see README)
# Tear it down:  make down

services:
  # --- Object storage: S3-compatible data lake ---------------------------
  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: edgeradar-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-edgeradar}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-edgeradar-dev-secret}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data
    healthcheck:
      # MinIO ships a liveness endpoint; compose waits on this before marking healthy.
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  # --- One-shot: create the bucket, then exit ----------------------------
  createbuckets:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    container_name: edgeradar-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${MINIO_BUCKET} &&
      echo 'bucket ready: '$${MINIO_BUCKET};
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-edgeradar}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-edgeradar-dev-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-edgeradar}

  # --- Streaming broker: Kafka-compatible, single container --------------
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: edgeradar-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      # Single internal listener; clients run inside the compose network
      # (e.g. `docker compose exec app edgeradar produce`).
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"   # Kafka API
      - "9644:9644"   # admin API
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # --- Web UI to inspect topics/messages (nice for dev, optional) --------
  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: edgeradar-redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"   # http://localhost:8080
    restart: unless-stopped

  # --- Python app: runs the CLI / ingestion / producers + consumers ------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edgeradar-app
    depends_on:
      createbuckets:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy
    environment:
      # Inside the compose network MinIO is reachable by service name.
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-edgeradar}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-edgeradar-dev-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-edgeradar}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_TOPIC_RAW: quotes_raw
    ports:
      - "3000:3000"   # Dagster UI (`make dagster`)
      - "8501:8501"   # Streamlit dashboard (`make dashboard`)
    volumes:
      - ./:/app          # live code mount for development
      - ./data:/app/data # persist the local lake + DuckDB file on the host
    # Keep the container alive so you can `docker compose exec app ...`.
    command: ["sleep", "infinity"]
    restart: unless-stopped

volumes:
  minio-data:
